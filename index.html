<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2K PFP Generator</title>
    <style>
        /* The Oceanic Y2K / Vista Background */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0088cc, #ff99cc); /* Updated to Teal/Pink */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Windows Vista Aero Glass Window */
        .vista-window {
            width: 400px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            overflow: hidden;
        }

        /* The Glossy Title Bar */
        .title-bar {
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8) 0%, rgba(180, 220, 255, 0.5) 50%, rgba(120, 190, 255, 0.6) 51%, rgba(200, 240, 255, 0.8) 100%);
            padding: 8px 15px;
            font-weight: bold;
            color: #003366;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-controls span {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 5px;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3);
        }
        .close-btn { background: #ff5555; }
        .max-btn { background: #55ff55; }
        .min-btn { background: #ffdd55; }

        /* Content Area */
        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Glossy Vista Buttons */
        button, input[type="file"]::file-selector-button {
            background: linear-gradient(to bottom, #ffe0f0 0%, #ffb3d9 49%, #ff80bf 50%, #ffcce6 100%);
            border: 1px solid #cc4488;
            border-radius: 4px;
            padding: 8px 15px;
            color: #660033;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.8), 0 2px 4px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        button:active, input[type="file"]::file-selector-button:active {
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
            background: #ff80bf;
        }

        /* Canvas */
        canvas {
            max-width: 100%;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 4px;
            background: rgba(0,0,0,0.1);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: none;
        }
    </style>
</head>
<body>

    <div class="vista-window">
        <div class="title-bar">
            <span>PFP_Gen_v1.exe</span>
            <div class="window-controls">
                <span class="min-btn"></span>
                <span class="max-btn"></span>
                <span class="close-btn"></span>
            </div>
        </div>
        <div class="content">
            <input type="file" id="upload" accept="image/*">
            <button id="regenerate" style="display:none;">Regenerate Vibe</button>
            <canvas id="canvas"></canvas>
            <button id="download" style="display:none;">Save PFP</button>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const regenerateBtn = document.getElementById('regenerate');
        const downloadBtn = document.getElementById('download');

        let originalImage = new Image();

        upload.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files);
        });

        originalImage.onload = function() {
            canvas.width = 400;
            canvas.height = 400;
            drawOriginalImage();
            canvas.style.display = 'block';
            regenerateBtn.style.display = 'inline-block';
            downloadBtn.style.display = 'inline-block';
        };

        function drawOriginalImage() {
            const size = Math.min(originalImage.width, originalImage.height);
            const x = (originalImage.width - size) / 2;
            const y = (originalImage.height - size) / 2;
            
            // Reset everything before drawing
            ctx.filter = 'none';
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
            
            ctx.drawImage(originalImage, x, y, size, size, 0, 0, canvas.width, canvas.height);
        }

        regenerateBtn.addEventListener('click', function() {
            // Pick a random vibe (0, 1, or 2)
            const effect = Math.floor(Math.random() * 3); 

            if (effect === 0) {
                // VIBE 1: Bubblegum Ethereal Bloom (Soft Pink Glow)
                drawOriginalImage();
                
                // Draw a bright, blurry pink-tinted version on top to make it glow
                ctx.globalCompositeOperation = 'screen';
                ctx.filter = 'blur(8px) saturate(200%) hue-rotate(300deg) brightness(120%)';
                ctx.globalAlpha = 0.6; 
                
                const size = Math.min(originalImage.width, originalImage.height);
                const x = (originalImage.width - size) / 2;
                const y = (originalImage.height - size) / 2;
                ctx.drawImage(originalImage, x, y, size, size, 0, 0, canvas.width, canvas.height);

                // Add a very faint pink wash over the whole thing
                ctx.globalCompositeOperation = 'overlay';
                ctx.fillStyle = 'rgba(255, 105, 180, 0.2)'; // Hot pink tint
                ctx.fillRect(0, 0, canvas.width, canvas.height);

            } else if (effect === 1) {
                // VIBE 2: Oceanic Water Glow (Teal/Cyan Frutiger Aero)
                drawOriginalImage();
                
                // Draw a glowing teal/cyan layer
                ctx.globalCompositeOperation = 'lighter';
                ctx.filter = 'blur(5px) sepia(100%) hue-rotate(150deg) saturate(300%)';
                ctx.globalAlpha = 0.5;
                
                const size = Math.min(originalImage.width, originalImage.height);
                const x = (originalImage.width - size) / 2;
                const y = (originalImage.height - size) / 2;
                ctx.drawImage(originalImage, x, y, size, size, 0, 0, canvas.width, canvas.height);

                // Glossy contrast boost
                ctx.globalCompositeOperation = 'overlay';
                ctx.fillStyle = 'rgba(0, 200, 255, 0.15)'; // Cyan tint
                ctx.fillRect(0, 0, canvas.width, canvas.height);

            } else if (effect === 2) {
                // VIBE 3: Dream Pixels (Soft, glowing, mosaic pixels)
                drawOriginalImage();
                
                const pixelSize = 12; // Size of the blocks
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = canvas.width / pixelSize;
                tempCanvas.height = canvas.height / pixelSize;
                
                // Draw tiny
                const size = Math.min(originalImage.width, originalImage.height);
                const x = (originalImage.width - size) / 2;
                const y = (originalImage.height - size) / 2;
                tempCtx.drawImage(originalImage, x, y, size, size, 0, 0, tempCanvas.width, tempCanvas.height);
                
                // Draw big (crunchy pixels)
                ctx.globalCompositeOperation = 'source-over';
                ctx.filter = 'saturate(150%) brightness(110%)';
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height, 0, 0, canvas.width, canvas.height);

                // Magic step: Overlay a soft blur on top of the pixels so they look ethereal
                ctx.globalCompositeOperation = 'screen';
                ctx.filter = 'blur(4px) hue-rotate(280deg)'; // Soft pink/purple glow over the pixels
                ctx.globalAlpha = 0.4;
                ctx.drawImage(canvas, 0, 0);
            }
        });

        downloadBtn.addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = 'Y2K_Dream_PFP.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
